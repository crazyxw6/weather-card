name: Update Weather Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: update-weather-main
  cancel-in-progress: false

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest repository
        run: |
          git pull --ff-only origin main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update weather data
        run: node scripts/update-weather.mjs
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}

      - name: Commit weather data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/weather.json

          if git diff --cached --quiet; then
            echo "Weather data did not change."
            exit 0
          fi

          git commit -m "Update weather data"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done

          echo "Failed to push weather data after 3 attempts."
          exit 1
