name: 生成 Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号，例如 v1.0.0'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 取出仓库文件
        uses: actions/checkout@v4

      - name: 打包 Windows zip
        run: |
          set -e
          VERSION="${{ github.event.inputs.version }}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            PAGE_URL="https://${OWNER}.github.io/"
          else
            PAGE_URL="https://${OWNER}.github.io/${REPO}/"
          fi

          mkdir -p dist/weather-card-windows
          printf '@echo off\r\nstart "" "%s"\r\n' "$PAGE_URL" > dist/weather-card-windows/start-weather-card.bat
          cp windows/README.txt dist/weather-card-windows/README.txt
          cd dist
          zip -r weather-card-windows.zip weather-card-windows
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: 发布 Release
        run: gh release create "$VERSION" dist/weather-card-windows.zip --title "天气卡片 Windows $VERSION" --notes "下载 weather-card-windows.zip，解压后双击 start-weather-card.bat。"
        env:
          GH_TOKEN: ${{ github.token }}
