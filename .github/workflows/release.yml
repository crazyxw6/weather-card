name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, for example v1.0.5'
        required: true
        default: 'v1.0.5'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Windows app
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $version = '${{ github.event.inputs.version }}'
          $owner = '${{ github.repository_owner }}'
          $repo = '${{ github.event.repository.name }}'

          if ($repo -eq "$owner.github.io") {
            $pageUrl = "https://$owner.github.io/"
          } else {
            $pageUrl = "https://$owner.github.io/$repo/"
          }

          New-Item -ItemType Directory -Force -Path build\WeatherCard, dist\weather-card-windows | Out-Null
          $outDir = (Resolve-Path dist\weather-card-windows).Path + '\'

          @"
          <Project ToolsVersion="15.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <Import Project="`$(MSBuildToolsPath)\Microsoft.Common.props" Condition="Exists('`$(MSBuildToolsPath)\Microsoft.Common.props')" />
            <PropertyGroup>
              <Configuration Condition=" '`$(Configuration)' == '' ">Release</Configuration>
              <Platform Condition=" '`$(Platform)' == '' ">AnyCPU</Platform>
              <OutputType>WinExe</OutputType>
              <TargetFrameworkVersion>v4.8</TargetFrameworkVersion>
              <RootNamespace>WeatherCard</RootNamespace>
              <AssemblyName>WeatherCard</AssemblyName>
              <UseWindowsForms>true</UseWindowsForms>
              <PlatformTarget>x64</PlatformTarget>
              <Prefer32Bit>false</Prefer32Bit>
              <AutoGenerateBindingRedirects>true</AutoGenerateBindingRedirects>
            </PropertyGroup>
            <PropertyGroup Condition="'`$(Configuration)|`$(Platform)' == 'Release|AnyCPU'">
              <OutputPath>bin\Release\</OutputPath>
            </PropertyGroup>
            <PropertyGroup Condition="'`$(Configuration)|`$(Platform)' == 'Debug|AnyCPU'">
              <OutputPath>bin\Debug\</OutputPath>
            </PropertyGroup>
            <ItemGroup>
              <Reference Include="System" />
              <Reference Include="System.Core" />
              <Reference Include="System.Drawing" />
              <Reference Include="System.Windows.Forms" />
            </ItemGroup>
            <ItemGroup>
              <PackageReference Include="Microsoft.Web.WebView2" Version="1.0.2849.39" />
            </ItemGroup>
            <ItemGroup>
              <Compile Include="Program.cs" />
            </ItemGroup>
            <Import Project="`$(MSBuildToolsPath)\Microsoft.CSharp.targets" />
          </Project>
          "@ | Set-Content -Path build\WeatherCard\WeatherCard.csproj -Encoding UTF8

          @"
          using System;
          using System.Diagnostics;
          using System.Drawing;
          using System.Windows.Forms;
          using Microsoft.Web.WebView2.WinForms;

          namespace WeatherCard
          {
              internal static class Program
              {
                  [STAThread]
                  private static void Main()
                  {
                      Application.EnableVisualStyles();
                      Application.SetCompatibleTextRenderingDefault(false);
                      Application.Run(new MainForm());
                  }
              }

              public sealed class MainForm : Form
              {
                  private const string PageUrl = "$pageUrl";
                  private readonly WebView2 webView = new WebView2();

                  public MainForm()
                  {
                      Text = "Weather Card";
                      StartPosition = FormStartPosition.CenterScreen;
                      Size = new Size(460, 760);
                      MinimumSize = new Size(380, 560);

                      webView.Dock = DockStyle.Fill;
                      Controls.Add(webView);

                      Load += async delegate
                      {
                          try
                          {
                              await webView.EnsureCoreWebView2Async();
                              webView.CoreWebView2.Settings.AreDevToolsEnabled = false;
                              webView.CoreWebView2.Settings.AreDefaultContextMenusEnabled = false;
                              webView.CoreWebView2.Navigate(PageUrl);
                          }
                          catch
                          {
                              MessageBox.Show(
                                  "This app requires Microsoft Edge WebView2 Runtime. Please update Microsoft Edge or install WebView2 Runtime.",
                                  "Weather Card",
                                  MessageBoxButtons.OK,
                                  MessageBoxIcon.Information);
                              Process.Start(new ProcessStartInfo
                              {
                                  FileName = "https://developer.microsoft.com/microsoft-edge/webview2/",
                                  UseShellExecute = true
                              });
                              Close();
                          }
                      };
                  }
              }
          }
          "@ | Set-Content -Path build\WeatherCard\Program.cs -Encoding UTF8

          msbuild build\WeatherCard\WeatherCard.csproj /restore /p:Configuration=Release /p:Platform=AnyCPU "/p:OutputPath=$outDir" "/p:OutDir=$outDir"

          if (-not (Test-Path dist\weather-card-windows\WeatherCard.exe)) {
            Get-ChildItem dist\weather-card-windows -Recurse
            throw "WeatherCard.exe was not found. Packaging stopped."
          }

          @"
          Weather Card for Windows

          How to use:
          1. Extract weather-card-windows.zip.
          2. Double-click WeatherCard.exe.
          3. Weather Card will open in a standalone app window.

          Notes:
          - This app requires an internet connection.
          - Weather data is updated by GitHub Actions.
          - If the app does not open, update Microsoft Edge or install Microsoft Edge WebView2 Runtime.
          "@ | Set-Content -Path dist\weather-card-windows\README.txt -Encoding UTF8

          Compress-Archive -Path dist\weather-card-windows -DestinationPath dist\weather-card-windows.zip -Force
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseExists = $false
          try {
            gh release view $env:VERSION *> $null
            $releaseExists = ($LASTEXITCODE -eq 0)
          } catch {
            $releaseExists = $false
          }

          if ($releaseExists) {
            gh release upload $env:VERSION dist\weather-card-windows.zip --clobber
          } else {
            gh release create $env:VERSION dist\weather-card-windows.zip --title "Weather Card for Windows $env:VERSION" --notes "Download weather-card-windows.zip, extract it, and double-click WeatherCard.exe."
          }

